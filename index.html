<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heart Particle Animation</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:black;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial, sans-serif;
    }

    canvas{
        position:absolute;
        top:0;
        left:0;
    }

    .text{
        position:absolute;
        z-index:10;
        font-size:60px;
        font-weight:bold;
        animation: glow 2s infinite alternate;
        text-align:center;
    }

    .blue{
        color:#00aaff;
        text-shadow:
        0 0 10px #00aaff,
        0 0 20px #00aaff,
        0 0 40px #00aaff;
    }

    .red{
        color:red;
        text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 40px red;
    }

    @keyframes glow{
        from{
            transform:scale(1);
        }
        to{
            transform:scale(1.1);
        }
    }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="text">
    <span class="blue">I</span>
    <span class="red"> Miss You</span>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heart(t){
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t)
            -5*Math.cos(2*t)
            -2*Math.cos(3*t)
            -Math.cos(4*t));
    return {x,y};
}

class Particle{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.size = Math.random()*3 + 1;
        this.alpha = Math.random();
        this.dx = (Math.random()-0.5)*2;
        this.dy = (Math.random()-0.5)*2;
    }

    update(){
        this.x += this.dx;
        this.y += this.dy;

        if(this.alpha > 0){
            this.alpha -= 0.005;
        }
    }

    draw(){
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = "pink";

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

function createHeart(){
    for(let i=0;i<100;i++){

        let t = Math.random()*Math.PI*2;
        let pos = heart(t);

        let x = canvas.width/2 + pos.x*20;
        let y = canvas.height/2 + pos.y*20;

        particles.push(new Particle(x,y));
    }
}

function animate(){
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    createHeart();

    particles.forEach((p,index)=>{
        p.update();
        p.draw();

        if(p.alpha <= 0){
            particles.splice(index,1);
        }
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
